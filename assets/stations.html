<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISD Weather Stations — Philippines</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #080e1e;
    --surface: rgba(15,26,43,.90);
    --line:    rgba(255,255,255,.08);
    --text:    #e8eaf2;
    --muted:   #7e8ba8;
    --accent:  #22d3ee;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --radius:  12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100vh;
    background: #070d1b;
  }


  /* ── Custom marker ── */
  .station-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid rgba(34,211,238,.35);
    box-shadow: 0 0 0 3px rgba(34,211,238,.12), 0 0 8px rgba(34,211,238,.4);
    transition: transform .15s, box-shadow .15s;
    cursor: pointer;
  }

  .station-dot:hover {
    transform: scale(1.6);
    box-shadow: 0 0 0 4px rgba(34,211,238,.2), 0 0 14px rgba(34,211,238,.6);
  }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    background: rgba(10,16,32,.96) !important;
    border: 1px solid rgba(34,211,238,.22) !important;
    border-radius: 10px !important;
    box-shadow: 0 12px 40px rgba(0,0,0,.7) !important;
    backdrop-filter: blur(12px);
    padding: 0 !important;
  }

  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-close-button { color: var(--muted) !important; top: 10px !important; right: 12px !important; font-size: 16px !important; }
  .leaflet-popup-close-button:hover { color: var(--text) !important; }

  .popup-inner {
    padding: 14px 16px;
    min-width: 200px;
  }

  .popup-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5px;
  }

  .popup-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .popup-meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .popup-row span:last-child { color: var(--text); }

  /* ── Legend ── */
  .map-legend {
    position: absolute;
    bottom: 20px;
    left: 14px;
    z-index: 1000;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 16px;
    backdrop-filter: blur(14px);
    pointer-events: none;
  }

  .legend-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid rgba(34,211,238,.35);
    box-shadow: 0 0 6px rgba(34,211,238,.4);
    flex-shrink: 0;
  }

  /* ── Station count badge ── */
  .map-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 1000;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 14px;
    backdrop-filter: blur(14px);
    pointer-events: none;
  }

  .badge-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .badge-count {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }

  .badge-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* ── Leaflet controls ── */
  .leaflet-control-zoom a {
    background: rgba(10,16,32,.92) !important;
    color: var(--muted) !important;
    border-color: var(--line) !important;
  }
  .leaflet-control-zoom a:hover { color: var(--text) !important; background: rgba(34,211,238,.1) !important; }
  .leaflet-control-attribution { background: rgba(8,14,30,.7) !important; color: #3a4a62 !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: #3a5a82 !important; }
</style>
</head>

  attributionControl: true,
});

  {
    attribution: '&copy; OpenStreetMap &copy; CartoDB',
    subdomains: 'abcd',

  }
).addTo(map);

// Custom icon

  return L.divIcon({
    className: '',
    html: '<div class="station-dot"></div>',
    iconSize: [10, 10],
    iconAnchor: [5, 5],
    popupAnchor: [0, -8],
  });
}

// Plot stations

  const marker = L.marker([s.lat, s.lon], { icon: makeIcon() }).addTo(map);
  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-eyebrow">NOAA ISD · USAF ${s.usaf}</div>
      <div class="popup-name">${s.name}</div>
      <div class="popup-meta">

    </div>

});

// postMessage height after tiles load
map.whenReady(() => {
  setTimeout(() => {

});
