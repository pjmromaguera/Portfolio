<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hazard Zonal Stats Mini Dashboard</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    .card { border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    label { font-weight: 600; display:block; margin-bottom: 6px; }
    select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #d1d5db; }
    img { width: 100%; border-radius: 12px; border: 1px solid #e5e7eb; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #eee; padding: 8px; text-align:left; font-size: 14px; }
    .muted { color: #6b7280; font-size: 14px; }
    .pill { display:inline-block; padding: 2px 10px; border-radius: 999px; background:#f3f4f6; margin-right: 6px; font-size: 12px; }
    canvas { width: 100%; height: 280px; }
  </style>
</head>
<body>
  <h1>Hazard Zonal Stats Mini Dashboard</h1>
  <p class="muted">
    Static demo (precomputed outputs). Pipeline: GeoPandas + Rasterio + rasterstats.
  </p>

  <div class="card">
    <div class="row">
      <div>
        <label for="layer">Select output layer</label>
        <select id="layer"></select>
        <p class="muted" id="layerDesc"></p>
        <div id="tags"></div>
      </div>
      <div>
        <label>Map preview</label>
        <img id="mapImg" alt="Map preview" />
        <p class="muted">Map images are exported from the Python pipeline.</p>
      </div>
    </div>
  </div>

  <div class="card">
    <label>Distribution (counts)</label>
    <canvas id="chart" width="800" height="280"></canvas>
    <p class="muted">Simple canvas bar chart (no external libraries).</p>
  </div>

  <div class="card">
    <label>Sample rows</label>
    <div class="muted">Showing first 15 rows from <code>results.csv</code></div>
    <table id="tbl"></table>
  </div>

<script>
  // Files you generate and commit to your repo:
  // - ./demo/summary.json
  // - ./demo/results.csv
  // - ./demo/maps/<layer>.png

  const SUMMARY_URL = "./demo/summary.json";
  const RESULTS_URL = "./demo/results.csv";
  const MAPS_DIR   = "./demo/maps/";

  const layerSelect = document.getElementById("layer");
  const mapImg = document.getElementById("mapImg");
  const chart = document.getElementById("chart");
  const ctx = chart.getContext("2d");
  const tbl = document.getElementById("tbl");
  const layerDesc = document.getElementById("layerDesc");
  const tags = document.getElementById("tags");

  let summary = null;
  let rows = [];

  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const header = lines[0].split(",");
    const data = lines.slice(1).map(line => {
      // naive CSV split (OK if your values don’t contain commas)
      const parts = line.split(",");
      const obj = {};
      header.forEach((h, i) => obj[h] = parts[i]);
      return obj;
    });
    return { header, data };
  }

  function drawBarChart(labels, values) {
    ctx.clearRect(0, 0, chart.width, chart.height);

    const W = chart.width, H = chart.height;
    const pad = 40;
    const maxV = Math.max(...values, 1);

    // axes
    ctx.strokeStyle = "#111";
    ctx.beginPath();
    ctx.moveTo(pad, pad);
    ctx.lineTo(pad, H - pad);
    ctx.lineTo(W - pad, H - pad);
    ctx.stroke();

    const barW = (W - pad*2) / labels.length * 0.7;
    const gap = (W - pad*2) / labels.length * 0.3;

    labels.forEach((lab, i) => {
      const v = values[i];
      const x = pad + i * (barW + gap) + gap/2;
      const barH = (H - pad*2) * (v / maxV);
      const y = (H - pad) - barH;

      ctx.fillStyle = "#d97706"; // amber-ish
      ctx.fillRect(x, y, barW, barH);

      ctx.fillStyle = "#111";
      ctx.font = "12px system-ui";
      ctx.fillText(lab, x, H - pad + 16);
      ctx.fillText(String(v), x, y - 6);
    });
  }

  function setPills(kind) {
    tags.innerHTML = "";
    const pill = (t) => {
      const s = document.createElement("span");
      s.className = "pill";
      s.textContent = t;
      return s;
    };
    if (kind.includes("flood")) tags.appendChild(pill("Flood"));
    if (kind.includes("stormsurge")) tags.appendChild(pill("Storm Surge"));
    if (kind.includes("landslide")) tags.appendChild(pill("Landslide"));
    if (kind.includes("_rating")) tags.appendChild(pill("Rating"));
    if (kind.includes("_depth")) tags.appendChild(pill("Depth"));
    if (kind.includes("_fos")) tags.appendChild(pill("FOS"));
  }

  function renderTable(header, data) {
    const head = `
      <tr>${header.map(h => `<th>${h}</th>`).join("")}</tr>
    `;
    const body = data.slice(0, 15).map(r => `
      <tr>${header.map(h => `<td>${(r[h] ?? "")}</td>`).join("")}</tr>
    `).join("");

    tbl.innerHTML = head + body;
  }

  function onLayerChange() {
    const layer = layerSelect.value;
    const dist = summary.distributions[layer] || {};
    const labels = Object.keys(dist);
    const values = labels.map(k => dist[k]);

    layerDesc.textContent = summary.layer_descriptions[layer] || "";
    setPills(layer);

    mapImg.src = `${MAPS_DIR}${layer}.png`;
    mapImg.onerror = () => {
      mapImg.src = "";
      mapImg.alt = "No map image found for this layer.";
    };

    drawBarChart(labels, values);

    // show only a subset of columns related to the chosen layer (plus id-ish fields if present)
    const keep = new Set(["id", "ID", "name", "Name", layer]);
    const header = summary.csv_header.filter(h => keep.has(h));
    if (header.length < 2) {
      renderTable(summary.csv_header.slice(0, 8), rows);
    } else {
      renderTable(header, rows);
    }
  }

  async function init() {
    const [sumRes, csvRes] = await Promise.all([fetch(SUMMARY_URL), fetch(RESULTS_URL)]);
    summary = await sumRes.json();

    const csvText = await csvRes.text();
    const parsed = parseCSV(csvText);
    summary.csv_header = parsed.header;
    rows = parsed.data;

    // populate dropdown
    const layers = summary.layers;
    layers.forEach(l => {
      const opt = document.createElement("option");
      opt.value = l;
      opt.textContent = l;
      layerSelect.appendChild(opt);
    });

    layerSelect.addEventListener("change", onLayerChange);
    layerSelect.value = layers[0];
    onLayerChange();
  }

  init().catch(err => {
    document.body.innerHTML += `<p style="color:red;">Failed to load demo assets: ${err}</p>`;
  });
</script>
</body>
</html>
